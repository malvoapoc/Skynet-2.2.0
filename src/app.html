<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Loading...</title>
    <link rel="stylesheet" href="assets/css/components-v2.css">
    <link rel="stylesheet" href="assets/css/obfuscated.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/app.css">
    <style>
        .loadingDom{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;text-align:center;}
        .loading-spinner{display:inline-block;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #0074FF;border-radius:50%;animation:domspin 1s linear infinite;margin-right:10px;}
        @keyframes domspin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .app-container{opacity:0;transition:opacity 0.3s ease-in-out;}
        .app-ready{opacity:1;}
        [v-cloak]{display:none !important}
    </style>
</head>
<body>
    <div class="loadingDom">
        <div class="loading-spinner"></div>
        Loading...
    </div>
    <script src="assets/js/vue.js"></script>
    <script src="assets/js/zepto.min.js"></script>
    <script src="assets/js/marked.js"></script>
    <script src="assets/js/lodash.js"></script>
    <script src="assets/js/clipboard.min.js"></script>
    <script src="assets/js/vue-i18n.js"></script>
    <script src="assets/js/axios.min.js"></script>
    <script src="assets/js/encrypt.js"></script>
    <script src="assets/js/index.min.js"></script>
    <script src="assets/js/dom.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
